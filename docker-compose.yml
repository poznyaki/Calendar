services:
  app:
    build: .
    ports: 
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8
    restart: always
    env_file:
      - .env
    ports: 
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./dbmysql.sql:/docker-entrypoint-initdb.d/dbmysql.sql

volumes:
  db_data:
